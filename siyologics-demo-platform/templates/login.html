{% extends "base.html" %}

{% block content %}

<div class="login-page">

  <div class="login-card fade-up">

    <!-- ICON -->
    <div style="width:48px;
                height:48px;
                background:var(--brand-soft);
                border-radius:12px;
                display:flex;
                align-items:center;
                justify-content:center;
                margin:0 auto 20px;
                font-size:1.4rem;">

      🔐

    </div>

    <!-- HEADER -->
    <h2>Dashboard Access</h2>

    <p>

      Sign in to access the demo
      management dashboard interface.

    </p>

    <!-- FORM -->
    <form method="POST"
          style="text-align:left;
                 margin-top:8px;">

      <div class="form-group">

        <label for="username">
          Username
        </label>

        <input type="text"
               id="username"
               name="username"
               placeholder="Enter username"
               autocomplete="username"
               required>

      </div>

      <div class="form-group">

        <label for="password">
          Password
        </label>

        <input type="password"
               id="password"
               name="password"
               placeholder="Enter password"
               autocomplete="current-password"
               required>

      </div>

      <button type="submit"
              class="btn btn-primary btn-lg"
              style="width:100%;
                     justify-content:center;
                     margin-top:8px;">

        Login →

      </button>

    </form>

    <!-- FOOTNOTE -->
    <p style="font-size:0.78rem;
              color:var(--ink-faint);
              margin-top:20px;">

      Demo interface intended for
      portfolio and showcase purposes.

    </p>

  </div>

</div>

{% endblock %}
